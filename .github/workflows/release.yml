name: Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g., v2.8.0)"
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Clear space to remove unused folders
        run: |
          rm -rf /usr/share/dotnet
          rm -rf /opt/ghc
          rm -rf "/usr/local/share/boost"
          rm -rf "$AGENT_TOOLSDIRECTORY"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Resolve image repository and version
        shell: bash
        run: |
          IMAGE_REPO="${{ vars.IMAGE_REPO }}"
          if [[ -z "$IMAGE_REPO" ]]; then
            IMAGE_REPO="ghcr.io/${GITHUB_REPOSITORY,,}"
          fi
          echo "IMAGE_REPO=$IMAGE_REPO" >> "$GITHUB_ENV"

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi

          echo "RELEASE_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "TAG=$VERSION" >> "$GITHUB_ENV"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push CUDA 13.0 image
        uses: docker/bake-action@v6
        env:
          TAG: ${{ env.RELEASE_VERSION }}
          IMAGE_REPO: ${{ env.IMAGE_REPO }}
        with:
          push: true
          source: .
          files: ./docker-bake.hcl
          targets: |
            cuda13

      - name: Clean up Docker build cache
        run: |
          docker builder prune -af --filter "until=1h"
          docker system prune -af --volumes

      - name: Build and push regular image
        uses: docker/bake-action@v6
        env:
          TAG: ${{ env.RELEASE_VERSION }}
          IMAGE_REPO: ${{ env.IMAGE_REPO }}
        with:
          push: true
          source: .
          files: ./docker-bake.hcl
          targets: |
            regular

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_VERSION }}
          name: ${{ env.RELEASE_VERSION }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release Summary
        run: |
          echo "Release completed."
          echo "Version: ${{ env.RELEASE_VERSION }}"
          echo "Docker Images:"
          echo " - ${{ env.IMAGE_REPO }}:${{ env.RELEASE_VERSION }}-cuda12.8 (CUDA 12.8)"
          echo " - ${{ env.IMAGE_REPO }}:cuda12.8"
          echo " - ${{ env.IMAGE_REPO }}:latest"
          echo " - ${{ env.IMAGE_REPO }}:${{ env.RELEASE_VERSION }}-cuda13.0 (CUDA 13.0)"
          echo " - ${{ env.IMAGE_REPO }}:cuda13.0"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "Trigger: Manual workflow dispatch"
          else
            echo "Trigger: Tag push (${{ github.ref_name }})"
          fi
