name: Dev Build

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  dev:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Clear space to remove unused folders
        run: |
          rm -rf /usr/share/dotnet
          rm -rf /opt/ghc
          rm -rf "/usr/local/share/boost"
          rm -rf "$AGENT_TOOLSDIRECTORY"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Resolve image repository
        shell: bash
        run: |
          IMAGE_REPO="${{ vars.IMAGE_REPO }}"
          if [[ -z "$IMAGE_REPO" ]]; then
            IMAGE_REPO="ghcr.io/${GITHUB_REPOSITORY,,}"
          fi
          echo "IMAGE_REPO=$IMAGE_REPO" >> "$GITHUB_ENV"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push CUDA 13.0 dev image
        uses: docker/bake-action@v6
        env:
          IMAGE_REPO: ${{ env.IMAGE_REPO }}
        with:
          push: true
          source: .
          files: ./docker-bake.hcl
          targets: |
            devpush-cuda13

      - name: Clean up Docker build cache
        run: |
          docker builder prune -af --filter "until=1h"
          docker system prune -af --volumes

      - name: Build and push regular dev image
        uses: docker/bake-action@v6
        env:
          IMAGE_REPO: ${{ env.IMAGE_REPO }}
        with:
          push: true
          source: .
          files: ./docker-bake.hcl
          targets: |
            devpush
